<!DOCTYPE html>
<html>
<head>
    <title>Scriptoria</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1>🎬 Scriptoria</h1>
